version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      # Images → /var/www/tres-joyeria/uploads/
      # Carousel → /var/www/tres-joyeria/carousel/   (path.dirname(UPLOADS_PATH)/carousel)
      # data.json → /var/www/tres-joyeria/frontend/dist/data.json  (hardcoded in carousel controller)
      UPLOADS_PATH: /var/www/tres-joyeria/uploads
    volumes:
      - shared_data:/var/www/tres-joyeria
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        # Empty = same-origin requests; nginx proxies /api/ to backend
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      # Nginx reads data.json and images from the same shared volume
      - shared_data:/var/www/tres-joyeria
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:
  shared_data:

networks:
  internal:
    driver: bridge
