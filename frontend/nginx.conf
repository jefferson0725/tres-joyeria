server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        image/svg+xml;

    client_max_body_size 20M;

    # ── API: proxy al backend ──────────────────────────────────────────────
    location /api/ {
        proxy_pass                  http://backend:4000/api/;
        proxy_http_version          1.1;
        proxy_set_header            Host              $host;
        proxy_set_header            X-Real-IP         $remote_addr;
        proxy_set_header            X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;
        proxy_connect_timeout       30s;
        proxy_read_timeout          120s;
        proxy_request_buffering     off;
        proxy_buffering             off;
        client_max_body_size        50M;
    }

    # ── Uploads legacy servidos por el backend ─────────────────────────────
    location /uploads/ {
        proxy_pass       http://backend:4000/uploads/;
        proxy_set_header Host $host;
    }

    # ── Imágenes del carrusel ──────────────────────────────────────────────
    # DEBE ir antes de /images/ para que nginx lo intercepte primero
    # Escritas por el backend en: /var/www/tres-joyeria/carousel/
    location /images/carousel/ {
        alias   /var/www/tres-joyeria/carousel/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Imágenes de productos ──────────────────────────────────────────────
    # Escritas por el backend en: /var/www/tres-joyeria/uploads/
    location /images/ {
        alias   /var/www/tres-joyeria/uploads/products/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── data.json dinámico (sin caché) ────────────────────────────────────
    # Actualizado por el backend tras cada cambio de catálogo
    location = /data.json {
        root /var/www/tres-joyeria/frontend/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── Sitemap generado por el backend ───────────────────────────────────
    location = /sitemap.xml {
        root /var/www/tres-joyeria/frontend/dist;
    }

    # ── Assets de Vite (nombres con hash) — caché larga ──────────────────
    location /assets/ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA (React Router) ────────────────────────────────────────────────
    location / {
        root       /usr/share/nginx/html;
        try_files  $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
